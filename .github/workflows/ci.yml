name: Playwright API Tests - Node JS

on:
  push:
    branches: [master]          # ← altere para sua branch default real (main ou master?)
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js + cache npm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'           # cacheia node_modules eficientemente

      - name: Install dependencies
        run: npm ci

      # NÃO precisa instalar browsers para API tests (request fixture)
      # - npx playwright install --with-deps  ← REMOVIDO

      - name: Run Playwright API tests
        run: npx playwright test

      - name: Upload Allure results
        if: always()                      # upload mesmo se falhar
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 7

  deploy-report:
    if: github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Install Allure commandline
        run: npm install -g allure-commandline

      - name: Check allure-results contents
        run: ls -la allure-results || echo "Pasta allure-results vazia ou não existe!"  

      - name: Generate Allure report
        run: |
          allure generate allure-results --clean -o allure-report || echo "Falha no generate!"
          ls -la allure-report
          cat allure-report/index.html | head -n 20 || echo "Sem index.html"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          force_orphan: true
          enable_commit: true
          commit_message: "Deploy Allure Report [ci skip]"